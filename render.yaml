databases:
  - name: birthday-playlist-db
    plan: free
    databaseName: birthday_playlist_production
    user: birthday_playlist

services:
  - type: web
    name: birthday-playlist-api
    runtime: ruby
    plan: free
    rootDir: api
    buildCommand: bundle install && bundle exec rails db:migrate
    startCommand: bundle exec rails server -b 0.0.0.0 -p $PORT
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"
      - key: RAILS_SERVE_STATIC_FILES
        value: "true"
      - key: DATABASE_URL
        fromDatabase:
          name: birthday-playlist-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: SECRET_KEY_BASE
        generateValue: true
      - key: LOCKBOX_MASTER_KEY
        sync: false
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: birthday-playlist
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: ""
    routes:
      - type: rewrite
        source: /api/*
        destination: https://birthday-playlist-api.onrender.com/api/:splat
      - type: rewrite
        source: /auth/*
        destination: https://birthday-playlist-api.onrender.com/auth/:splat
      - type: rewrite
        source: /*
        destination: /index.html
